# PvPBot Configuration
# Phase 4 - Full movement, combat, ranged, shield, & mace combo AI

settings:
  max-total-bots: 50
  max-bots-per-player: 5
  bot-prefix: "Bot"
  keep-chunks-loaded: true
  show-in-tab-list: true
  auto-cleanup-on-shutdown: true

bot-settings:
  # Movement
  move-speed: 0.25
  bhop: false
  idle: false
  idle-radius: 10
  retreat: false
  retreat-health: 0.3
  view-distance: 32.0
  aim-speed: 0.15
  combat-strafe: true
  combat-strafe-interval: 20

  # Melee Combat
  combat: false
  revenge: false
  criticals: false
  attack-cooldown: 10
  melee-range: 3.0
  prefer-sword: true

  # Targeting
  auto-target: false
  target-players: true
  target-mobs: false
  target-bots: false

  # Shield
  auto-shield: false
  shield-break: false
  shield-break-chance: 30.0
  shield-hold-ticks: 40
  shield-raise-ticks: 5
  shield-mace: false

  # Ranged Combat
  ranged: false
  ranged-min-range: 5.0
  ranged-optimal-range: 20.0
  ranged-max-range: 50.0
  bow-draw-ticks: 20
  arrow-prediction: true
  ranged-strafe: true
  ranged-retreat: true

  # Mace Wind-Charge Combo
  mace: false

  # Survival / Utilities
  auto-armor: false
  auto-weapon: false
  auto-eat: false
  auto-potion: false
  auto-mend: false
  auto-totem: false
  totem-priority: false

  # Realism / Difficulty
  miss-chance: 0
  mistake-chance: 0
  profile-lagg-fix: false

  # Death / Respawn
  bot-leave-on-death: false
  show-in-tab: true
