name: Release Publisher

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Extract version from tag
      run: echo "CLEAN_VER=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

    - name: Align plugin.yml version
      run: sed -i "s/version:.*/version: '${{ env.CLEAN_VER }}'/g" src/main/resources/plugin.yml

    - name: Build and Reobfuscate Jar
      run: ./gradlew build

    - name: Rename jar
      run: cp build/libs/*-reobf.jar "build/libs/PvPBot-${{ env.CLEAN_VER }}.jar"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: build/libs/PvPBot-${{ env.CLEAN_VER }}.jar
        generate_release_notes: true
        make_latest: true
